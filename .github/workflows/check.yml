name: Smoke Check

on:
  workflow_dispatch:
  schedule:
    - cron: '23 */6 * * 1-5'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Live public source smoke
        env:
          LIVE_SMOKE: 'true'
        run: npm run smoke
